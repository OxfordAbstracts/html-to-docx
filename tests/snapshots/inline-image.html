<!DOCTYPE html>
<html>

<head>
  <title>Inline Image Test</title>
</head>

<body>
  <!-- Image inside an anchor tag -->
  <p>
    <a href="https://example.com">
      <img src="https://placehold.co/300x300.webp" />
    </a>
  </p>

  <!-- Image inside a span with surrounding text -->
  <p>
    <span>Before image <img src="https://placehold.co/200x200.webp" /> after image</span>
  </p>

  <!-- Image inside a cite element -->
  <p>
    <cite><img src="https://placehold.co/150x150.webp" /></cite>
  </p>

  <!-- Mixed: text and image inside a styled inline element -->
  <p>
    <strong>Bold text <img src="https://placehold.co/100x100.webp" /> more bold text</strong>
  </p>
</body>

</html>
